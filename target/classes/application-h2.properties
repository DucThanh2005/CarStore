# ================== SERVER ==================
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ================== H2 DATABASE (For Local Testing) ==================
spring.datasource.url=jdbc:h2:mem:carstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ================== INIT DATA ==================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false

# ================== GOOGLE OAUTH2 ==================
# Authorized redirect URI phải là: http://localhost:8082/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=CLIENT_ID_THAT_CUA_BAN.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=CLIENT_SECRET_THAT_CUA_BAN
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com