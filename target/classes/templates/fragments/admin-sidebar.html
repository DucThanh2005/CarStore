<!DOCTYPE html>
<div th:fragment="sidebar">
    <div class="cs-card p-4 h-100 dashboard-panel-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="mb-1">Bảng điều khiển</h5>
                <p class="cs-muted small mb-0">Truy cập nhanh các chức năng quản trị</p>
            </div>
            <span class="badge bg-light text-dark">Admin</span>
        </div>
        <div class="list-group list-group-flush mb-4 dashboard-quick-links">
            <a th:href="@{/admin/dashboard}" class="list-group-item list-group-item-action rounded-3">Home</a>
            <a th:href="@{/admin/cars}" class="list-group-item list-group-item-action rounded-3">Car list</a>
            <a th:href="@{/admin/create-car}" class="list-group-item list-group-item-action rounded-3">Create car</a>
            <a th:href="@{/admin/users}" class="list-group-item list-group-item-action rounded-3">Manage users</a>
            <a th:href="@{/admin/orders}" class="list-group-item list-group-item-action rounded-3">Manage orders</a>
        </div>
        <div class="dashboard-summary-item mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="cs-muted small">Today's visitors</span>
                <strong>1.2K</strong>
            </div>
            <div class="progress" style="height: 6px;">
                <div class="progress-bar bg-primary" role="progressbar" style="width: 72%;"></div>
            </div>
        </div>
        <div class="dashboard-summary-item">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="cs-muted small">Order completion</span>
                <strong>88%</strong>
            </div>
            <div class="progress" style="height: 6px;">
                <div class="progress-bar bg-success" role="progressbar" style="width: 88%;"></div>
            </div>
        </div>
    </div>
</div>
