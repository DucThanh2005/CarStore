# ================== SERVER ==================
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ================== SQL SERVER ==================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CarStore;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ================== INIT DATA (SQL Server) ==================
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false

# ================== GOOGLE OAUTH2 ==================
# Lấy trong Google Cloud Console -> APIs & Services -> Credentials -> OAuth Client ID
# Authorized redirect URI phải là: http://localhost:8082/login/oauth2/code/google
# Không up client-secret thật lên GitHub.
spring.security.oauth2.client.registration.google.client-id=CLIENT_ID_THAT_CUA_BAN.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=CLIENT_SECRET_THAT_CUA_BAN
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com